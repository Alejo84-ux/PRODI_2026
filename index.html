// --- NUEVO SISTEMA DE PUNTOS ---
function calcPuntos(user) {
  let pts = 0, exactos = 0, parciales = 0, errores = 0;
  const ups = pronosticos[user] || {};
  const esArg = (m) => m.local.includes("Argentina") || m.visita.includes("Argentina");

  Object.keys(FIXTURE).forEach(phase => {
    FIXTURE[phase].forEach(m => {
      const p = ups[m.id], r = RESULTADOS_OFICIALES[m.id];
      if (!p || !r) return;

      const esArgentina = esArg(m);
      if (phase === 'grupos') {
        if ((p.h > p.a && r.h > r.a) || (p.h < p.a && r.h < r.a) || (p.h === p.a && r.h === r.a)) {
          pts += 2; parciales++;
          if (p.h === r.h && p.a === r.a) { pts += 1 + (p.h + p.a); exactos++; }
        } else { errores++; }
        if (esArgentina) { pts += 1; if (p.h === r.h && p.a === r.a) pts += 1; }
      } else {
        const pF = { 'r32': 5, 'r16': 5, 'cuartos': 7, 'semis': 9, '3RD': 11, 'FINAL': 13 };
        const gL = (p.h > p.a && r.h > r.a) || (p.h < p.a && r.h < r.a);
        if (gL) pts += (pF[phase] || 5);
        if (p.h === r.h && p.a === r.a) { pts += 2 + (p.h + p.a); }
        if (esArgentina) {
          if (phase !== '3RD' && gL) pts += 1;
          if (phase === '3RD' && gL) pts -= 5;
          if (phase === 'FINAL' && gL) pts += 2;
          if (p.h === r.h && p.a === r.a) pts += 5;
        }
      }
    });
  });

  if (ups.extras && RESULTADOS_OFICIALES.extras) {
    ['arg_1', 'arg_2', 'arg_3', 'arg_8', 'arg_4', 'arg_S'].forEach(id => {
      if (ups.extras[id] && ups.extras[id] === RESULTADOS_OFICIALES.extras[id]) pts += 1;
    });
    if (ups.extras['arg_F'] === RESULTADOS_OFICIALES.extras['arg_F']) pts += 5;
  }
  return { pts, exactos, parciales, errores };
}
